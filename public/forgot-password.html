<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password — BookMyShot</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500&family=Outfit:wght@300;400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/css/theme.css">
  <link rel="stylesheet" href="/css/auth.css">
  <script src="/js/ga.js"></script>
</head>
<body>
  <div class="auth-container">
    <div class="auth-card">
      <div class="auth-header">
        <a href="/" class="auth-logo">BOOKMYSHOT</a>
        <h1 id="pageTitle">Forgot Password</h1>
        <p id="pageDesc">Enter your email to receive a reset code</p>
      </div>

      <!-- Step 1: Enter email -->
      <form id="step1" class="auth-form">
        <div class="form-group"><label>Email</label><input type="email" id="resetEmail" required placeholder="your@email.com"></div>
        <div id="step1Error" style="color:#ef4444;font-size:.82rem;margin-bottom:.5rem"></div>
        <button type="submit" class="btn btn-primary btn-block">Send Reset Code</button>
      </form>

      <!-- Step 2: Enter OTP -->
      <form id="step2" class="auth-form" style="display:none">
        <div class="form-group"><label>6-Digit Reset Code</label><input type="text" id="resetOtp" maxlength="6" pattern="[0-9]{6}" placeholder="000000" required style="font-size:1.5rem;letter-spacing:.5rem;text-align:center;font-weight:700"></div>
        <div id="step2Error" style="color:#ef4444;font-size:.82rem;margin-bottom:.5rem"></div>
        <button type="submit" class="btn btn-primary btn-block">Verify Code</button>
        <button type="button" class="btn btn-outline btn-block" style="margin-top:.5rem;font-size:.8rem" onclick="resendReset()">Resend Code</button>
      </form>

      <!-- Step 3: New password -->
      <form id="step3" class="auth-form" style="display:none">
        <div class="form-group"><label>New Password</label><input type="password" id="newPassword" required minlength="8" placeholder="Min 8 characters"></div>
        <div class="form-group"><label>Confirm Password</label><input type="password" id="confirmPassword" required minlength="8" placeholder="Repeat password"></div>
        <div id="step3Error" style="color:#ef4444;font-size:.82rem;margin-bottom:.5rem"></div>
        <button type="submit" class="btn btn-primary btn-block">Reset Password</button>
      </form>

      <div id="successMsg" style="display:none;text-align:center;padding:1.5rem">
        <p style="color:#10b981;font-size:.9rem;margin-bottom:1rem">✓ Password reset successfully!</p>
        <a href="/login.html" class="btn btn-primary">Login Now</a>
      </div>

      <div class="auth-footer"><a href="/login.html">← Back to Login</a></div>
    </div>
  </div>

  <script src="/js/api.js"></script>
  <script>
    var email = '', resetToken = '';

    document.getElementById('step1').addEventListener('submit', async function(e) {
      e.preventDefault();
      email = document.getElementById('resetEmail').value.trim();
      document.getElementById('step1Error').textContent = '';
      try {
        await API.post('/auth/forgot-password', { email: email });
        document.getElementById('step1').style.display = 'none';
        document.getElementById('step2').style.display = 'block';
        document.getElementById('pageTitle').textContent = 'Enter Reset Code';
        document.getElementById('pageDesc').textContent = 'Check your email for the 6-digit code';
      } catch (err) { document.getElementById('step1Error').textContent = err.message || 'Failed'; }
    });

    document.getElementById('step2').addEventListener('submit', async function(e) {
      e.preventDefault();
      var otp = document.getElementById('resetOtp').value.trim();
      document.getElementById('step2Error').textContent = '';
      try {
        var res = await API.post('/auth/verify-reset-otp', { email: email, otp: otp });
        resetToken = res.resetToken;
        document.getElementById('step2').style.display = 'none';
        document.getElementById('step3').style.display = 'block';
        document.getElementById('pageTitle').textContent = 'Set New Password';
        document.getElementById('pageDesc').textContent = 'Choose a strong password (min 8 characters)';
      } catch (err) { document.getElementById('step2Error').textContent = err.message || 'Invalid code'; }
    });

    document.getElementById('step3').addEventListener('submit', async function(e) {
      e.preventDefault();
      var pw = document.getElementById('newPassword').value;
      var cpw = document.getElementById('confirmPassword').value;
      document.getElementById('step3Error').textContent = '';
      if (pw !== cpw) { document.getElementById('step3Error').textContent = 'Passwords do not match'; return; }
      if (pw.length < 8) { document.getElementById('step3Error').textContent = 'Min 8 characters'; return; }
      try {
        await API.post('/auth/reset-password', { email: email, resetToken: resetToken, password: pw });
        document.getElementById('step3').style.display = 'none';
        document.getElementById('successMsg').style.display = 'block';
        document.getElementById('pageTitle').textContent = 'Done!';
        document.getElementById('pageDesc').textContent = '';
      } catch (err) { document.getElementById('step3Error').textContent = err.message || 'Failed'; }
    });

    function resendReset() {
      API.post('/auth/forgot-password', { email: email }).then(function() {
        document.getElementById('step2Error').textContent = '';
        alert('New code sent to your email');
      }).catch(function(err) { document.getElementById('step2Error').textContent = err.message || 'Failed'; });
    }
  </script>
</body>
</html>
