<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Creator Subscription — BookMyShot</title>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600&family=Outfit:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <script src="https://checkout.razorpay.com/v1/checkout.js"></script>
  <script src="/js/ga.js"></script>
  <style>
    :root{--bg:#0a0806;--card:#141210;--border:rgba(255,140,39,.12);--gold:#ff8c27;--gold-light:#ffb366;--cream:#f6eee7;--text:#d4c8bc;--muted:#8a7e72;--success:#10b981;--danger:#ef4444;--radius:14px;--font-display:'Cormorant Garamond',serif;--font-body:'Outfit',sans-serif}
    *{margin:0;padding:0;box-sizing:border-box}
    body{font-family:var(--font-body);background:var(--bg);color:var(--text);min-height:100vh;display:flex;flex-direction:column}
    .header{display:flex;align-items:center;justify-content:space-between;padding:1rem 2rem;border-bottom:1px solid var(--border);background:var(--card)}
    .logo{font-family:var(--font-display);font-size:1.5rem;color:var(--cream);font-weight:600;text-decoration:none}.logo span{color:var(--gold)}
    .main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem}
    .sub-card{max-width:480px;width:100%;background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:2.5rem 2rem;text-align:center}
    .sub-icon{width:64px;height:64px;border-radius:50%;background:rgba(255,140,39,.1);border:2px solid rgba(255,140,39,.25);display:flex;align-items:center;justify-content:center;margin:0 auto 1.25rem;font-size:1.5rem;color:var(--gold)}
    .sub-title{font-family:var(--font-display);font-size:1.6rem;color:var(--cream);margin-bottom:.4rem;font-weight:600}
    .sub-plan{font-size:.82rem;color:var(--muted);margin-bottom:1.25rem}
    .sub-amount{font-size:2.2rem;font-weight:700;color:var(--gold);margin-bottom:.3rem}
    .sub-period{font-size:.78rem;color:var(--muted);margin-bottom:1.5rem}
    .sub-trial{background:rgba(16,185,129,.08);border:1px solid rgba(16,185,129,.2);border-radius:10px;padding:.6rem 1rem;font-size:.78rem;color:var(--success);margin-bottom:1.5rem;display:inline-block}
    .sub-details{text-align:left;background:rgba(255,255,255,.02);border:1px solid var(--border);border-radius:10px;padding:1rem;margin-bottom:1.5rem}
    .sub-details .row{display:flex;justify-content:space-between;padding:.4rem 0;font-size:.8rem;border-bottom:1px solid rgba(255,255,255,.03)}
    .sub-details .row:last-child{border:none}
    .sub-details .label{color:var(--muted)}.sub-details .value{color:var(--cream);font-weight:500}
    .btn-pay{width:100%;padding:.75rem;background:linear-gradient(135deg,#e85a14,#ff9b2e);color:#100803;border:none;border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s}
    .btn-pay:hover{box-shadow:0 8px 32px rgba(255,140,39,.3)}
    .btn-pay:disabled{opacity:.5;cursor:not-allowed}
    .btn-free{width:100%;padding:.75rem;background:rgba(16,185,129,.12);border:1px solid rgba(16,185,129,.3);color:var(--success);border-radius:10px;font-size:.9rem;font-weight:600;cursor:pointer;transition:all .2s}
    .btn-free:hover{background:rgba(16,185,129,.2)}
    .status-card{text-align:center;padding:1.5rem}
    .status-card .icon{font-size:2rem;margin-bottom:.5rem}
    .status-card h3{color:var(--cream);font-size:1rem;margin-bottom:.3rem}
    .status-card p{font-size:.78rem;color:var(--muted)}
    @media(max-width:600px){.main{padding:1.5rem 1rem}.sub-card{padding:2rem 1.25rem}.sub-title{font-size:1.3rem}.sub-amount{font-size:1.8rem}}
  </style>
</head>
<body>
  <header class="header">
    <a href="/" class="logo">BookMyShot<span>.</span></a>
    <button onclick="API.clearAuth();location.href='/'" style="background:none;border:1px solid var(--border);color:var(--muted);padding:.4rem .8rem;border-radius:8px;font-size:.75rem;cursor:pointer">Logout</button>
  </header>
  <main class="main">
    <div class="sub-card" id="subCard">
      <div style="display:flex;flex-direction:column;gap:0.6rem">
        <div style="height:48px;background:rgba(255,255,255,0.03);border-radius:10px;animation:pulse 1.5s infinite"></div>
        <div style="height:78px;background:rgba(255,255,255,0.03);border-radius:14px;animation:pulse 1.5s infinite"></div>
      </div>
    </div>
  </main>
  <style>@keyframes pulse{0%,100%{opacity:1}50%{opacity:.4}}</style>
  <script src="/js/api.js"></script>
  <script>
  (function() {
    'use strict';
    var user = API.getUser();
    var token = API.getToken();
    if (!user || !token || user.role !== 'creator') { window.location.href = '/creator-auth.html'; return; }

    async function init() {
      try {
        var [config, rpConfig] = await Promise.all([
          API.get('/config/public'),
          API.get('/razorpay/config'),
        ]);

        var sub = config.subscription || {};
        var amount = sub.monthlyPlanPrice || 0;
        var trialDays = sub.trialDays || 0;
        var freeTrialEnabled = sub.freeTrialEnabled !== false;
        var razorpayKey = rpConfig.keyId || '';
        var razorpayConfigured = rpConfig.configured;

        // Check if subscription already active
        var me = await API.get('/auth/me');
        var subStatus = me.creator ? me.creator.subscriptionStatus : '';
        if (subStatus === 'active' || subStatus === 'trial') {
          window.location.href = '/creator/pending.html';
          return;
        }

        var card = document.getElementById('subCard');
        var trialEndDate = new Date();
        trialEndDate.setDate(trialEndDate.getDate() + trialDays);

        // CASE A: Free trial available
        if (amount === 0 || (freeTrialEnabled && trialDays > 0)) {
          card.innerHTML = '<div class="sub-icon"><i class="fas fa-crown"></i></div>' +
            '<h2 class="sub-title">Creator Subscription</h2>' +
            '<p class="sub-plan">BookMyShot Creator Plan</p>' +
            '<div class="sub-amount">₹' + amount + '</div>' +
            '<div class="sub-period">per month</div>' +
            (trialDays > 0 ? '<div class="sub-trial"><i class="fas fa-gift"></i> Free Trial: ' + trialDays + ' Days</div>' : '') +
            '<div class="sub-details">' +
              '<div class="row"><span class="label">Plan</span><span class="value">Monthly</span></div>' +
              '<div class="row"><span class="label">Amount</span><span class="value">₹' + amount + '/month</span></div>' +
              (trialDays > 0 ? '<div class="row"><span class="label">Free Trial</span><span class="value">' + trialDays + ' Days</span></div>' : '') +
              (trialDays > 0 ? '<div class="row"><span class="label">Trial Ends</span><span class="value">' + trialEndDate.toLocaleDateString('en-IN') + '</span></div>' : '') +
              '<div class="row"><span class="label">Auto-renew</span><span class="value">After trial via Razorpay</span></div>' +
            '</div>' +
            '<button class="btn-free" id="startTrialBtn"><i class="fas fa-play"></i> Start Free Trial</button>';

          document.getElementById('startTrialBtn').addEventListener('click', async function() {
            this.disabled = true; this.textContent = 'Activating...';
            try {
              await API.post('/revenue/creator/subscribe', {});
              window.location.href = '/creator/pending.html';
            } catch (e) { window.location.href = '/creator/pending.html'; }
          });

        // CASE B: Payment required via Razorpay
        } else {
          card.innerHTML = '<div class="sub-icon"><i class="fas fa-crown"></i></div>' +
            '<h2 class="sub-title">Creator Subscription</h2>' +
            '<p class="sub-plan">BookMyShot Creator Plan</p>' +
            '<div class="sub-amount">₹' + amount + '</div>' +
            '<div class="sub-period">per month • Auto-renews via Razorpay</div>' +
            '<div class="sub-details">' +
              '<div class="row"><span class="label">Plan</span><span class="value">Monthly</span></div>' +
              '<div class="row"><span class="label">Amount</span><span class="value">₹' + amount + '/month</span></div>' +
              '<div class="row"><span class="label">Payment</span><span class="value">Razorpay AutoPay</span></div>' +
              '<div class="row"><span class="label">Renewal</span><span class="value">Automatic monthly</span></div>' +
            '</div>' +
            '<button class="btn-pay" id="payBtn"><i class="fas fa-credit-card"></i> Subscribe & Pay ₹' + amount + '</button>' +
            '<p style="font-size:.68rem;color:var(--muted);margin-top:.75rem">Secure payment powered by Razorpay</p>';

          document.getElementById('payBtn').addEventListener('click', async function() {
            if (!razorpayConfigured) { alert('Payment gateway not configured. Contact admin.'); return; }
            this.disabled = true; this.textContent = 'Processing...';
            try {
              var orderRes = await API.post('/razorpay/create-subscription-order', {});
              var options = {
                key: razorpayKey,
                amount: orderRes.order.amount,
                currency: 'INR',
                name: 'BookMyShot',
                description: 'Creator Monthly Subscription',
                order_id: orderRes.order.id,
                handler: async function(response) {
                  try {
                    await API.post('/razorpay/verify-payment', {
                      razorpay_order_id: response.razorpay_order_id,
                      razorpay_payment_id: response.razorpay_payment_id,
                      razorpay_signature: response.razorpay_signature,
                      type: 'subscription',
                    });
                    window.location.href = '/creator/pending.html';
                  } catch (e) { alert('Payment verification failed. Contact support.'); location.reload(); }
                },
                prefill: { name: user.name || '', email: user.email || '' },
                theme: { color: '#ff8c27' },
                modal: { ondismiss: function() { document.getElementById('payBtn').disabled = false; document.getElementById('payBtn').innerHTML = '<i class="fas fa-credit-card"></i> Subscribe & Pay ₹' + amount; } },
              };
              var rzp = new Razorpay(options);
              rzp.open();
            } catch (e) {
              alert(e.message || 'Failed to create payment order');
              this.disabled = false; this.innerHTML = '<i class="fas fa-credit-card"></i> Subscribe & Pay ₹' + amount;
            }
          });
        }
      } catch (e) {
        document.getElementById('subCard').innerHTML = '<div class="status-card"><div class="icon">⚠️</div><h3>Error</h3><p>' + (e.message || 'Failed to load') + '</p><button onclick="location.reload()" class="btn-pay" style="margin-top:1rem">Retry</button></div>';
      }
    }

    init();
  })();
  </script>
</body>
</html>
