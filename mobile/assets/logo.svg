    <path d="M0,0 L0,130 L55,130 C80,130 95,115 95,95 C95,80 85,70 72,67 C83,63 90,52 90,40 C90,18 72,0 50,0 Z M25,20 L48,20 C60,20 67,28 67,40 C67,52 60,60 48,60 L25,60 Z M25,75 L52,75 C66,75 72,84 72,95 C72,107 65,112 52,112 L25,112 Z"/>
  </g>
